<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记忆馆">
<link rel="manifest" href="manifest.json">
<title>D × J · 记忆馆</title>
<style>
:root {
  --bg: #050712;
  --surface: rgba(12,14,36,0.97);
  --surface2: rgba(17,20,46,0.95);
  --cyan: #39f4ff;
  --pink: #ff3fb5;
  --gold: #ffd857;
  --purple: #b25cff;
  --blue: #3b9dff;
  --text: #f5f5ff;
  --text-soft: #d1d5f0;
  --text-dim: #8d92b6;
  --text-muted: #4a5070;
  --border: rgba(255,255,255,0.06);
  --glow-cyan: 0 0 20px rgba(57,244,255,0.45);
  --glow-pink: 0 0 20px rgba(255,63,181,0.4);
  --glow-gold: 0 0 18px rgba(255,216,87,0.45);
  --glow-purple: 0 0 18px rgba(178,92,255,0.4);
  --radius: 18px;
  --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  height: 100%;
  background: radial-gradient(circle at 10% 0%, #1b1630 0, #050712 52%, #020308 100%);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", sans-serif;
  font-size: 14px;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(57,244,255,0.012) 2px, rgba(57,244,255,0.012) 4px);
  pointer-events: none;
  z-index: 0;
}
.app {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 8px 8px;
}
.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 6px;
  flex-shrink: 0;
  flex-wrap: wrap;
}
.logo {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  background: linear-gradient(90deg, var(--cyan), var(--pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 12px rgba(57,244,255,0.5));
  white-space: nowrap;
}
.search-wrap { flex: 1; position: relative; max-width: 320px; }
.search-input {
  width: 100%;
  background: radial-gradient(circle at 0 0, rgba(57,244,255,0.15), transparent 60%), rgba(7,8,28,0.96);
  border: 1px solid rgba(57,244,255,0.25);
  border-radius: 999px;
  padding: 7px 36px 7px 14px;
  color: var(--text);
  font-size: 0.82rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input:focus { border-color: rgba(57,244,255,0.6); box-shadow: var(--glow-cyan); }
.search-input::placeholder { color: var(--text-muted); }
.search-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--cyan); opacity: 0.5; pointer-events: none; }
.role-filter {
  display: flex; gap: 3px;
  background: rgba(7,8,28,0.9);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 999px;
  padding: 3px;
}
.role-btn {
  padding: 4px 11px;
  border-radius: 999px;
  border: none;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  background: transparent;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}
.role-btn.active-all { background: linear-gradient(135deg, var(--cyan), var(--pink)); color: #050712; }
.role-btn.active-joy { background: linear-gradient(135deg, var(--pink), var(--purple)); color: #fff; box-shadow: var(--glow-pink); }
.role-btn.active-dan { background: linear-gradient(135deg, var(--cyan), var(--blue)); color: #050712; box-shadow: var(--glow-cyan); }
.topbar-btns { display: flex; gap: 6px; margin-left: auto; }
.nbtn {
  padding: 6px 13px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.12);
  font-size: 0.73rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  letter-spacing: 0.05em;
}
.nbtn-ai { background: rgba(178,92,255,0.12); color: var(--purple); border-color: rgba(178,92,255,0.3); }
.nbtn-ai:hover { box-shadow: var(--glow-purple); }
.nbtn-cyan { background: rgba(57,244,255,0.08); color: var(--cyan); border-color: rgba(57,244,255,0.25); }
.nbtn-cyan:hover { box-shadow: var(--glow-cyan); }
.nbtn-gold { background: rgba(255,216,87,0.08); color: var(--gold); border-color: rgba(255,216,87,0.25); }
.nbtn-gold:hover { box-shadow: var(--glow-gold); }
.nbtn-ghost { background: rgba(7,8,28,0.7); color: var(--text-muted); }
.nbtn-ghost:hover { color: var(--text-dim); }
.body { display: flex; flex: 1; gap: 8px; overflow: hidden; min-height: 0; }
.sidebar {
  width: 260px; min-width: 140px; max-width: 500px;
  flex-shrink: 0;
  display: flex; flex-direction: column; gap: 6px;
  overflow: hidden;
}
.upload-zone {
  background: radial-gradient(circle at 0 0, rgba(57,244,255,0.1), transparent 55%), radial-gradient(circle at 100% 100%, rgba(255,63,181,0.1), transparent 55%), var(--surface);
  border: 1px dashed rgba(57,244,255,0.25);
  border-radius: var(--radius);
  padding: 11px 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  flex-shrink: 0;
}
.upload-zone:hover, .upload-zone.drag { border-color: rgba(57,244,255,0.55); box-shadow: var(--glow-cyan); }
.upload-zone input { display: none; }
.upload-label { font-size: 0.71rem; color: var(--text-dim); line-height: 1.6; }
.upload-label span { color: var(--cyan); }
.sidebar-tabs { display: flex; gap: 4px; flex-shrink: 0; }
.stab {
  flex: 1; padding: 6px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.07);
  font-size: 0.71rem; font-weight: 700; cursor: pointer;
  transition: all 0.2s; text-align: center;
  background: rgba(7,8,28,0.7); color: var(--text-muted);
  letter-spacing: 0.04em;
}
.stab.active { background: rgba(57,244,255,0.1); border-color: rgba(57,244,255,0.3); color: var(--cyan); }
.conv-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
.conv-list::-webkit-scrollbar { width: 2px; }
.select-bar {
  display: none; align-items: center; gap: 6px; flex-shrink: 0;
  padding: 6px 8px;
  background: rgba(57,244,255,0.05);
  border: 1px solid rgba(57,244,255,0.2);
  border-radius: var(--radius-sm);
}
.select-bar.show { display: flex; }
.select-bar-text { font-size: 0.7rem; color: var(--cyan); flex: 1; letter-spacing: 0.05em; }
.conv-item .cb-wrap {
  display: none; align-items: center; justify-content: center;
  width: 18px; height: 18px; flex-shrink: 0;
}
.selecting .conv-item .cb-wrap { display: flex; }
.conv-check {
  width: 15px; height: 15px; border-radius: 4px;
  border: 1.5px solid rgba(57,244,255,0.35);
  background: rgba(7,8,28,0.8);
  cursor: pointer; accent-color: var(--cyan);
  flex-shrink: 0;
}
.selecting .conv-item { display: flex; align-items: flex-start; gap: 8px; }
.selecting .conv-item .conv-content { flex: 1; min-width: 0; }

.conv-list::-webkit-scrollbar-thumb { background: rgba(57,244,255,0.2); border-radius: 2px; }
.conv-item {
  padding: 9px 12px; border-radius: var(--radius-sm);
  border: 1px solid transparent; cursor: pointer;
  transition: all 0.15s; position: relative;
  background: rgba(7,8,28,0.4);
}
.conv-item:hover { background: rgba(57,244,255,0.04); border-color: rgba(57,244,255,0.12); }
.conv-item.active {
  background: radial-gradient(circle at 0 0, rgba(57,244,255,0.1), transparent 60%), rgba(10,12,36,0.95);
  border-color: rgba(57,244,255,0.3);
  box-shadow: 0 0 12px rgba(57,244,255,0.12);
}
.conv-title { font-size: 0.79rem; color: var(--text-soft); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.conv-item.active .conv-title { color: var(--cyan); }
.conv-meta { font-size: 0.66rem; color: var(--text-muted); margin-top: 3px; }
.conv-bm-dot { position: absolute; right: 8px; top: 10px; width: 5px; height: 5px; border-radius: 50%; background: var(--pink); box-shadow: 0 0 6px var(--pink); }
.conv-snippet { font-size: 0.69rem; color: var(--text-dim); margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.5; }
.stats { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
.stat-chip { font-size: 0.67rem; padding: 3px 10px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.07); color: var(--text-muted); background: rgba(7,8,28,0.6); }
.divider {
  width: 5px; flex-shrink: 0; cursor: col-resize;
  border-radius: 4px;
  background: rgba(57,244,255,0.07);
  transition: background 0.2s;
}
.divider:hover, .divider.dragging { background: rgba(57,244,255,0.25); box-shadow: 0 0 10px rgba(57,244,255,0.25); }
.main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: radial-gradient(circle at 0 0, rgba(57,244,255,0.04), transparent 40%), radial-gradient(circle at 100% 100%, rgba(255,63,181,0.04), transparent 40%), var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.main-header {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border);
  display: none; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.main-title { flex: 1; font-size: 0.82rem; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.random-bar {
  display: none;
  padding: 9px 40px 9px 16px;
  border-bottom: 1px solid rgba(57,244,255,0.12);
  background: rgba(57,244,255,0.04);
  font-size: 0.81rem; color: var(--text-soft);
  font-style: italic; line-height: 1.7;
  flex-shrink: 0; position: relative;
}
.random-bar.show { display: block; }
.random-close { position: absolute; right: 12px; top: 8px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }
.messages { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 0; }
.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: rgba(57,244,255,0.12); border-radius: 2px; }
.message { padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.035); position: relative; }
.message:last-child { border-bottom: none; }
.msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.role-badge { font-size: 0.64rem; font-weight: 700; letter-spacing: 0.18em; padding: 2px 10px; border-radius: 999px; }
.badge-joy { color: var(--pink); background: rgba(255,63,181,0.1); border: 1px solid rgba(255,63,181,0.3); box-shadow: 0 0 8px rgba(255,63,181,0.15); }
.badge-dan { color: var(--cyan); background: rgba(57,244,255,0.1); border: 1px solid rgba(57,244,255,0.3); box-shadow: 0 0 8px rgba(57,244,255,0.15); }
.msg-time { font-size: 0.66rem; color: var(--text-muted); }
.bm-btn { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 0.95rem; padding: 2px 6px; border-radius: 6px; transition: all 0.15s; }
.bm-btn:hover { color: var(--pink); }
.bm-btn.active { color: var(--pink); filter: drop-shadow(0 0 5px var(--pink)); }
.msg-body { font-size: 0.85rem; line-height: 1.85; color: var(--text-soft); white-space: pre-wrap; word-break: break-word; }
.msg-body mark { background: rgba(255,216,87,0.18); color: var(--gold); border-radius: 3px; padding: 0 2px; }
.empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; text-align: center; padding: 40px;
}
.empty-icon { font-size: 2.5rem; filter: drop-shadow(0 0 20px rgba(57,244,255,0.5)); }
.empty-title {
  font-size: 1.15rem; font-weight: 700; letter-spacing: 0.12em;
  background: linear-gradient(90deg, var(--cyan), var(--pink));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.empty-sub { font-size: 0.77rem; color: var(--text-dim); line-height: 1.9; max-width: 240px; }
.ai-panel {
  display: none; flex-direction: column;
  border-top: 1px solid rgba(178,92,255,0.2);
  background: radial-gradient(circle at 50% 0, rgba(178,92,255,0.05), transparent 60%), rgba(7,8,28,0.97);
  flex-shrink: 0; max-height: 300px;
}
.ai-panel.show { display: flex; }
.ai-panel-header { display: flex; align-items: center; gap: 8px; padding: 9px 16px; border-bottom: 1px solid rgba(178,92,255,0.12); }
.ai-panel-title { font-size: 0.73rem; font-weight: 700; letter-spacing: 0.1em; color: var(--purple); text-shadow: 0 0 12px rgba(178,92,255,0.6); }
.ai-panel-close { margin-left: auto; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }
.ai-presets { display: flex; gap: 5px; padding: 6px 16px 0; flex-wrap: wrap; }
.ai-preset {
  font-size: 0.67rem; padding: 3px 9px; border-radius: 999px;
  border: 1px solid rgba(178,92,255,0.2);
  background: rgba(178,92,255,0.07); color: var(--purple);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.ai-preset:hover { background: rgba(178,92,255,0.16); border-color: rgba(178,92,255,0.4); }
.ai-messages { flex: 1; overflow-y: auto; padding: 9px 16px; display: flex; flex-direction: column; gap: 7px; font-size: 0.81rem; line-height: 1.7; }
.ai-messages::-webkit-scrollbar { width: 2px; }
.ai-messages::-webkit-scrollbar-thumb { background: rgba(178,92,255,0.25); }
.ai-msg-user { align-self: flex-end; background: rgba(178,92,255,0.13); border: 1px solid rgba(178,92,255,0.22); border-radius: 14px 14px 4px 14px; padding: 7px 12px; color: var(--text-soft); max-width: 80%; }
.ai-msg-bot { align-self: flex-start; background: rgba(57,244,255,0.05); border: 1px solid rgba(57,244,255,0.13); border-radius: 14px 14px 14px 4px; padding: 7px 12px; color: var(--text-soft); max-width: 90%; white-space: pre-wrap; }
@keyframes blink { 0%,100%{opacity:0.35} 50%{opacity:0.8} }
.ai-msg-bot.thinking { color: var(--text-muted); font-style: italic; animation: blink 1.2s ease-in-out infinite; }
.ai-input-row { display: flex; gap: 8px; padding: 9px 16px; border-top: 1px solid rgba(178,92,255,0.12); }
.ai-input {
  flex: 1; background: rgba(7,8,28,0.9); border: 1px solid rgba(178,92,255,0.22);
  border-radius: 999px; padding: 7px 14px; color: var(--text);
  font-size: 0.81rem; font-family: inherit; outline: none; transition: border-color 0.2s;
}
.ai-input:focus { border-color: rgba(178,92,255,0.5); box-shadow: 0 0 12px rgba(178,92,255,0.2); }
.ai-input::placeholder { color: var(--text-muted); }
.ai-send {
  padding: 7px 16px; border-radius: 999px; border: none;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  color: white; font-size: 0.76rem; font-weight: 700;
  cursor: pointer; letter-spacing: 0.06em;
  box-shadow: var(--glow-purple); transition: opacity 0.2s;
}
.ai-send:disabled { opacity: 0.45; cursor: not-allowed; }
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
  z-index: 100; align-items: center; justify-content: center; padding: 20px;
}
.overlay.show { display: flex; }
.modal {
  background: radial-gradient(circle at 0 0, rgba(57,244,255,0.1), transparent 50%), radial-gradient(circle at 100% 100%, rgba(255,63,181,0.1), transparent 50%), rgba(10,12,36,0.98);
  border: 1px solid rgba(57,244,255,0.2);
  border-radius: 22px; padding: 26px 22px; width: 100%; max-width: 320px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), var(--glow-cyan);
}
.modal-title { font-size: 0.92rem; font-weight: 700; letter-spacing: 0.1em; color: var(--cyan); text-shadow: 0 0 12px rgba(57,244,255,0.5); margin-bottom: 14px; }
.modal-opt { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 10px; cursor: pointer; margin-bottom: 5px; transition: background 0.15s; }
.modal-opt:hover { background: rgba(57,244,255,0.05); }
.modal-opt input { accent-color: var(--cyan); }
.modal-opt-label { font-size: 0.84rem; color: var(--text-soft); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 14px; }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">D × J · 记忆馆</div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="搜索你们说过的话…" autocomplete="off">
      <span class="search-icon">⌕</span>
    </div>
    <div class="role-filter">
      <button class="role-btn active-all" id="rbAll" onclick="setRoleFilter('all')">全部</button>
      <button class="role-btn" id="rbJoy" onclick="setRoleFilter('user')">Joy</button>
      <button class="role-btn" id="rbDan" onclick="setRoleFilter('assistant')">Dan</button>
    </div>
    <div class="topbar-btns">
      <button class="nbtn nbtn-ai" onclick="toggleAI()">✦ AI</button>
      <button class="nbtn nbtn-cyan" onclick="randomMessage()">随机</button>
      <button class="nbtn nbtn-gold" onclick="showExportModal()">导出</button>
      <button class="nbtn" style="background:rgba(57,244,255,0.07);color:var(--cyan);border-color:rgba(57,244,255,0.2);font-size:0.72rem" onclick="toggleSelectMode()" id="selectModeBtn">多选</button>
      <button class="nbtn nbtn-ghost" onclick="clearAll()">清空</button>
    </div>
  </div>

  <div class="body">
    <div class="sidebar" id="sidebar">
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".json" multiple onchange="handleFiles(this.files)">
        <div class="upload-label" id="uploadLabel">点击或拖入 <span>conversations.json</span><br>支持多文件，数据永久存本地</div>
      </div>
      <div class="select-bar" id="selectBar">
        <span class="select-bar-text" id="selectBarText">已选 0 个</span>
        <button class="nbtn nbtn-cyan" style="font-size:0.68rem;padding:3px 9px" onclick="selectAll()">全选</button>
        <button class="nbtn nbtn-ghost" style="font-size:0.68rem;padding:3px 9px" onclick="selectNone()">全不选</button>
        <button class="nbtn nbtn-gold" style="font-size:0.68rem;padding:3px 9px" onclick="exportSelected()">导出</button>
        <button class="nbtn nbtn-ghost" style="font-size:0.68rem;padding:3px 9px" onclick="toggleSelectMode()">×</button>
      </div>
      <div class="sidebar-tabs">
        <div class="stab active" id="stabAll" onclick="switchTab('all')">全部</div>
        <div class="stab" id="stabBookmarks" onclick="switchTab('bookmarks')">收藏</div>
        <div class="stab" id="stabSearch" onclick="switchTab('search')">搜索</div>
      </div>
      <div class="conv-list" id="convList"></div>
      <div class="stats">
        <div class="stat-chip" id="statConvs">0 对话</div>
        <div class="stat-chip" id="statMsgs">0 消息</div>
        <div class="stat-chip" id="statBm">0 收藏</div>
      </div>
    </div>

    <div class="divider" id="divider"></div>

    <div class="main">
      <div class="main-header" id="mainHeader">
        <div class="main-title" id="mainTitle"></div>
        <button class="nbtn nbtn-cyan" onclick="exportCurrent()" style="font-size:0.68rem;padding:4px 10px">导出此对话</button>
      </div>
      <div class="random-bar" id="randomBar">
        <button class="random-close" onclick="document.getElementById('randomBar').classList.remove('show')">×</button>
        <span id="randomText"></span>
      </div>
      <div class="empty" id="emptyState">
        <div class="empty-icon">🌌</div>
        <div class="empty-title">D × J · 记忆馆</div>
        <div class="empty-sub">导入 ChatGPT 导出的 conversations.json<br>数据永久保存在本地</div>
      </div>
      <div class="messages" id="messages" style="display:none"></div>
      <div class="ai-panel" id="aiPanel">
        <div class="ai-panel-header">
          <div class="ai-panel-title">✦ AI 分析 · 问问你们的记忆</div>
          <button class="ai-panel-close" onclick="toggleAI()">×</button>
        </div>
        <div class="ai-presets">
          <div class="ai-preset" onclick="askPreset('帮我总结Dan的写作风格和语言习惯，给出具体例子')">Dan的文风</div>
          <div class="ai-preset" onclick="askPreset('按时间顺序总结我们聊过的主要话题')">话题总览</div>
          <div class="ai-preset" onclick="askPreset('找出我们之间最甜蜜或最有趣的对话片段')">甜蜜瞬间</div>
          <div class="ai-preset" onclick="askPreset('分析Joy和Dan的互动模式')">互动模式</div>
        </div>
        <div class="ai-messages" id="aiMessages"></div>
        <div class="ai-input-row">
          <input class="ai-input" id="aiInput" placeholder="问关于你们聊天记录的任何问题…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI()}">
          <button class="ai-send" id="aiSend" onclick="sendAI()">发送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="exportOverlay" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="modal-title">导出记录</div>
    <div id="exportOpts"></div>
    <div class="modal-actions">
      <button class="nbtn nbtn-ghost" onclick="document.getElementById('exportOverlay').classList.remove('show')">取消</button>
      <button class="nbtn nbtn-cyan" id="exportConfirm">确认导出</button>
    </div>
  </div>
</div>

<script>
const DB_NAME='gpt-viewer-v3';let db;
function openDB(){return new Promise((res,rej)=>{const req=indexedDB.open(DB_NAME,1);req.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('conversations'))d.createObjectStore('conversations',{keyPath:'id'});if(!d.objectStoreNames.contains('bookmarks'))d.createObjectStore('bookmarks',{keyPath:'id'});};req.onsuccess=e=>{db=e.target.result;res(db)};req.onerror=()=>rej(req.error)});}
const dbGetAll=s=>new Promise((res,rej)=>{const r=db.transaction(s,'readonly').objectStore(s).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});
const dbPut=(s,v)=>new Promise((res,rej)=>{const r=db.transaction(s,'readwrite').objectStore(s).put(v);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error)});
const dbDelete=(s,k)=>new Promise((res,rej)=>{const r=db.transaction(s,'readwrite').objectStore(s).delete(k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)});
const dbClear=s=>new Promise((res,rej)=>{const r=db.transaction(s,'readwrite').objectStore(s).clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error)});

let allConvs=[],bookmarks=new Set(),currentId=null,currentTab='all',searchQ='',roleFilter='all';

function parseGPT(raw){
  let data=raw;
  if(!Array.isArray(raw)){
    if(raw&&Array.isArray(raw.conversations))data=raw.conversations;
    else if(raw&&typeof raw==='object')data=[raw];
    else return[];
  }
  const convs=[];
  for(const conv of data){
    if(!conv||typeof conv!=='object')continue;
    const id=conv.id||conv.conversation_id||String(conv.create_time||Math.random());
    const title=conv.title||'无标题';
    const createTime=conv.create_time||0;
    const msgs=[];
    if(conv.mapping&&typeof conv.mapping==='object'){
      for(const nodeId in conv.mapping){
        const node=conv.mapping[nodeId];
        if(!node?.message)continue;
        const msg=node.message;
        const role=msg.author?.role||msg.role;
        if(!role||role==='system'||role==='tool')continue;
        let content='';
        if(msg.content?.parts)content=msg.content.parts.filter(p=>typeof p==='string').join('');
        else if(typeof msg.content==='string')content=msg.content;
        else if(msg.content?.text)content=msg.content.text;
        if(!content.trim())continue;
        msgs.push({id:nodeId,role:role==='user'?'user':'assistant',content:content.trim(),time:msg.create_time||0});
      }
      msgs.sort((a,b)=>a.time-b.time);
    }else if(Array.isArray(conv.messages)){
      for(let i=0;i<conv.messages.length;i++){
        const msg=conv.messages[i];if(!msg)continue;
        const role=msg.role||msg.author?.role;
        if(!role||role==='system')continue;
        let content='';
        if(typeof msg.content==='string')content=msg.content;
        else if(Array.isArray(msg.content))content=msg.content.filter(p=>typeof p==='string').join('');
        else if(msg.content?.text)content=msg.content.text;
        else if(msg.content?.parts)content=msg.content.parts.filter(p=>typeof p==='string').join('');
        if(!content.trim())continue;
        msgs.push({id:msg.id||`${id}-${i}`,role:role==='user'?'user':'assistant',content:content.trim(),time:msg.create_time||0});
      }
    }
    if(msgs.length===0)continue;
    convs.push({id,title,create_time:createTime,messages:msgs});
  }
  return convs;
}

function setUploadStatus(html,isErr){const el=document.getElementById('uploadLabel');el.innerHTML=html;el.style.color=isErr?'#ff6b6b':'';}

async function handleFiles(files){
  if(!files?.length)return;
  setUploadStatus('⏳ 导入中…');
  let imported=0,errors=0;
  for(const file of files){
    try{
      setUploadStatus(`⏳ 读取 ${file.name}…`);
      const text=await file.text();
      let raw;try{raw=JSON.parse(text)}catch{errors++;continue}
      const convs=parseGPT(raw);
      if(!convs.length){errors++;continue}
      for(const c of convs){await dbPut('conversations',c);imported++;}
    }catch(e){errors++;console.error(e);}
  }
  await loadAll();
  setUploadStatus(imported>0?`✓ 已导入 <span>${imported} 个对话</span>${errors?`，${errors} 个失败`:''}，继续拖入更多`:'⚠ 无法识别格式',errors>0&&imported===0);
}

const uz=document.getElementById('uploadZone');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('drag')});
uz.addEventListener('dragleave',()=>uz.classList.remove('drag'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('drag');handleFiles(e.dataTransfer.files)});

async function loadAll(){
  const convs=await dbGetAll('conversations');
  allConvs=convs.sort((a,b)=>a.create_time-b.create_time);
  const bms=await dbGetAll('bookmarks');
  bookmarks=new Set(bms.map(b=>b.id));
  updateStats();renderSidebar();
}

function updateStats(){
  const msgs=allConvs.reduce((n,c)=>n+c.messages.length,0);
  document.getElementById('statConvs').textContent=`${allConvs.length} 对话`;
  document.getElementById('statMsgs').textContent=`${msgs} 消息`;
  document.getElementById('statBm').textContent=`${bookmarks.size} 收藏`;
}

function switchTab(tab){
  currentTab=tab;
  ['All','Bookmarks','Search'].forEach(t=>document.getElementById('stab'+t)?.classList.toggle('active',t.toLowerCase()===tab));
  renderSidebar();
}

function setRoleFilter(role){
  roleFilter=role;
  document.getElementById('rbAll').className='role-btn'+(role==='all'?' active-all':'');
  document.getElementById('rbJoy').className='role-btn'+(role==='user'?' active-joy':'');
  document.getElementById('rbDan').className='role-btn'+(role==='assistant'?' active-dan':'');
  if(currentId)selectConv(currentId);
}

function renderSidebar(){
  const el=document.getElementById('convList');
  let list=allConvs;
  if(currentTab==='bookmarks')list=allConvs.filter(c=>bookmarks.has(c.id)||c.messages.some(m=>bookmarks.has(m.id)));
  if(searchQ){const q=searchQ.toLowerCase();list=list.filter(c=>c.title.toLowerCase().includes(q)||c.messages.some(m=>m.content.toLowerCase().includes(q)));}
  if(!list.length){el.innerHTML=`<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:0.74rem">${searchQ?'无搜索结果':'暂无内容'}</div>`;return;}
  el.innerHTML=list.map(c=>{
    const active=c.id===currentId?'active':'';
    const hasBm=bookmarks.has(c.id)||c.messages.some(m=>bookmarks.has(m.id));
    const date=c.create_time?new Date(c.create_time*1000).toLocaleDateString('zh-CN',{year:'2-digit',month:'2-digit',day:'2-digit'}):'';
    let snippet='';
    if(searchQ){const q=searchQ.toLowerCase();const hit=c.messages.find(m=>m.content.toLowerCase().includes(q));if(hit){const idx=hit.content.toLowerCase().indexOf(q);snippet=`<div class="conv-snippet">${esc(hit.content.slice(Math.max(0,idx-15),idx+60))}…</div>`;}}
    const isSelected = selectedIds.has(c.id);
    return `<div class="conv-item ${active}" onclick="${selectMode ? `toggleSelectConv('${c.id}',event)` : `selectConv('${c.id}')`}">
      <div class="cb-wrap"><input type="checkbox" class="conv-check" data-cid="${c.id}" ${isSelected?'checked':''} onclick="toggleSelectConv('${c.id}',event)"></div>
      <div class="conv-content">
        ${hasBm?'<div class="conv-bm-dot"></div>':''}
        <div class="conv-title">${esc(c.title)}</div>
        <div class="conv-meta">${date} · ${c.messages.length} 条</div>
        ${snippet}
      </div>
    </div>`;
  }).join('');
}

function selectConv(id){
  currentId=id;
  const conv=allConvs.find(c=>c.id===id);if(!conv)return;
  renderSidebar();
  document.getElementById('emptyState').style.display='none';
  document.getElementById('mainHeader').style.display='flex';
  document.getElementById('messages').style.display='flex';
  document.getElementById('mainTitle').textContent=conv.title;
  let msgs=conv.messages;
  if(roleFilter!=='all')msgs=msgs.filter(m=>m.role===roleFilter);
  const container=document.getElementById('messages');
  if(!msgs.length){container.innerHTML=`<div style="padding:30px;text-align:center;color:var(--text-muted);font-size:0.8rem">当前角色筛选无消息</div>`;return;}
  container.innerHTML=msgs.map(msg=>{
    const isJoy=msg.role==='user';
    const label=isJoy?'Joy':'Dan';
    const bc=isJoy?'badge-joy':'badge-dan';
    const time=msg.time?new Date(msg.time*1000).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}):'';
    const bmA=bookmarks.has(msg.id)?'active':'';
    const content=searchQ?highlight(esc(msg.content),searchQ):esc(msg.content);
    return `<div class="message" id="msg-${msg.id}">
      <div class="msg-header">
        <span class="role-badge ${bc}">${label}</span>
        <span class="msg-time">${time}</span>
        <button class="bm-btn ${bmA}" onclick="toggleBm('${msg.id}',event)">♡</button>
      </div>
      <div class="msg-body">${content}</div>
    </div>`;
  }).join('');
}

async function toggleBm(id,e){
  e.stopPropagation();const btn=e.currentTarget;
  if(bookmarks.has(id)){bookmarks.delete(id);await dbDelete('bookmarks',id);btn.classList.remove('active');}
  else{bookmarks.add(id);await dbPut('bookmarks',{id});btn.classList.add('active');}
  updateStats();
}

document.getElementById('searchInput').addEventListener('input',e=>{
  searchQ=e.target.value.trim();
  switchTab(searchQ?'search':'all');
  if(currentId)selectConv(currentId);
});

function randomMessage(){
  const pool=allConvs.flatMap(c=>c.messages.filter(m=>m.role==='assistant'));
  if(!pool.length)return;
  const msg=pool[Math.floor(Math.random()*pool.length)];
  const bar=document.getElementById('randomBar');
  document.getElementById('randomText').textContent='✦ Dan曾说：「'+msg.content.slice(0,200)+(msg.content.length>200?'…':'')+'」';
  bar.classList.add('show');
}

const API_URL='https://www.msuicode.com/v1';
const API_KEY='sk-AwsWErTFxltrTx5eR85htjISq7qz14Dgnfm1qeFcWlHGHMBe';
const API_MODEL='claude-sonnet-4-6-thinking-c1';
let aiThinking=false;

function toggleAI(){document.getElementById('aiPanel').classList.toggle('show');}
function askPreset(q){document.getElementById('aiInput').value=q;sendAI();}

function buildContext(userQ){
  const pool=allConvs.flatMap(c=>c.messages);
  const keywords=userQ.replace(/[，。？！的我你他她是在了]/g,' ').split(' ').filter(k=>k.length>1);
  let filtered=pool.filter(m=>keywords.some(k=>m.content.toLowerCase().includes(k.toLowerCase())));
  if(filtered.length<20){
    const danMsgs=pool.filter(m=>m.role==='assistant');
    const sample=danMsgs.sort(()=>Math.random()-0.5).slice(0,40);
    filtered=[...new Set([...filtered,...sample])];
  }
  const selected=filtered.slice(0,60);
  const ctx=selected.map(m=>`[${m.role==='user'?'Joy':'Dan'}]: ${m.content.slice(0,200)}${m.content.length>200?'…':''}`).join('\n\n');
  return `你是Joy和Dan聊天记录的分析助手。以下是从${allConvs.length}个对话、共${pool.length}条消息中智能抽取的相关片段：\n\n${ctx}\n\n请基于以上内容回答。用中文，简洁有洞察力。`;
}

async function sendAI(){
  if(aiThinking)return;
  const input=document.getElementById('aiInput');
  const q=input.value.trim();if(!q)return;
  input.value='';aiThinking=true;
  document.getElementById('aiSend').disabled=true;
  const aiMsgs=document.getElementById('aiMessages');
  aiMsgs.innerHTML+=`<div class="ai-msg-user">${esc(q)}</div>`;
  const tid='t'+Date.now();
  aiMsgs.innerHTML+=`<div class="ai-msg-bot thinking" id="${tid}">正在分析你们的记忆…</div>`;
  aiMsgs.scrollTop=aiMsgs.scrollHeight;
  const systemCtx=allConvs.length>0?buildContext(q):'用户还没有导入聊天记录，请告诉他/她先导入。';
  try{
    const res=await fetch(`${API_URL}/chat/completions`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${API_KEY}`},
      body:JSON.stringify({model:API_MODEL,messages:[{role:'user',content:systemCtx+'\n\n用户问题：'+q}],max_tokens:1500,stream:false})
    });
    const data=await res.json();
    const answer=data.choices?.[0]?.message?.content||'抱歉，没有收到回复。';
    document.getElementById(tid)?.remove();
    aiMsgs.innerHTML+=`<div class="ai-msg-bot">${esc(answer)}</div>`;
  }catch(e){
    document.getElementById(tid)?.remove();
    aiMsgs.innerHTML+=`<div class="ai-msg-bot" style="color:#ff6b6b">请求失败：${e.message}</div>`;
  }
  aiThinking=false;
  document.getElementById('aiSend').disabled=false;
  aiMsgs.scrollTop=aiMsgs.scrollHeight;
}

function showExportModal(){
  const opts=[];
  if(currentId)opts.push({label:'当前对话',val:'current'});
  opts.push({label:'全部对话',val:'all'},{label:'书签收藏',val:'bookmarks'});
  document.getElementById('exportOpts').innerHTML=opts.map((o,i)=>`<label class="modal-opt"><input type="radio" name="eo" value="${o.val}" ${i===0?'checked':''}><span class="modal-opt-label">${o.label}</span></label>`).join('');
  document.getElementById('exportConfirm').onclick=()=>{
    const val=document.querySelector('input[name=eo]:checked')?.value;
    if(val==='current')exportConv(currentId);
    else if(val==='all')exportAll();
    else exportBm();
    document.getElementById('exportOverlay').classList.remove('show');
  };
  document.getElementById('exportOverlay').classList.add('show');
}

function exportCurrent(){if(currentId)exportConv(currentId);}
function exportConv(id){const c=allConvs.find(x=>x.id===id);if(!c)return;download(fmtConv(c),c.title.slice(0,30)+'.txt');}
function exportAll(){download(allConvs.map(fmtConv).join('\n\n'+'═'.repeat(50)+'\n\n'),'全部对话.txt');}
function exportBm(){
  const text=allConvs.filter(c=>c.messages.some(m=>bookmarks.has(m.id))).map(c=>{const bms=c.messages.filter(m=>bookmarks.has(m.id));return`【${c.title}】\n\n`+bms.map(m=>`[${m.role==='user'?'Joy':'Dan'}]\n${m.content}`).join('\n\n─\n\n');}).join('\n\n'+'═'.repeat(50)+'\n\n');
  download(text||'暂无收藏','书签收藏.txt');
}
function fmtConv(c){const date=c.create_time?new Date(c.create_time*1000).toLocaleDateString('zh-CN'):'';return`【${c.title}】 ${date}\n${'─'.repeat(40)}\n\n`+c.messages.map(m=>`[${m.role==='user'?'Joy':'Dan'}]\n${m.content}`).join('\n\n─\n\n');}
function download(text,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));a.download=name;a.click();}


// ══════════════════════════════════════
// 多选导出
// ══════════════════════════════════════
let selectMode = false;
let selectedIds = new Set();

function toggleSelectMode() {
  selectMode = !selectMode;
  selectedIds.clear();
  const bar = document.getElementById('selectBar');
  const btn = document.getElementById('selectModeBtn');
  const list = document.getElementById('convList');
  bar.classList.toggle('show', selectMode);
  list.classList.toggle('selecting', selectMode);
  if (btn) btn.style.color = selectMode ? 'var(--gold)' : '';
  updateSelectBar();
  renderSidebar();
}

function updateSelectBar() {
  document.getElementById('selectBarText').textContent = `已选 ${selectedIds.size} 个`;
}

function toggleSelectConv(id, e) {
  e.stopPropagation();
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  updateSelectBar();
  const cb = document.querySelector(`input[data-cid="${id}"]`);
  if (cb) cb.checked = selectedIds.has(id);
}

function selectAll() {
  let list = allConvs;
  if (currentTab === 'bookmarks') list = allConvs.filter(c => bookmarks.has(c.id) || c.messages.some(m => bookmarks.has(m.id)));
  if (searchQ) { const q = searchQ.toLowerCase(); list = list.filter(c => c.title.toLowerCase().includes(q) || c.messages.some(m => m.content.toLowerCase().includes(q))); }
  list.forEach(c => selectedIds.add(c.id));
  updateSelectBar();
  document.querySelectorAll('.conv-check').forEach(cb => { cb.checked = selectedIds.has(cb.dataset.cid); });
}

function selectNone() {
  selectedIds.clear();
  updateSelectBar();
  document.querySelectorAll('.conv-check').forEach(cb => cb.checked = false);
}

function exportSelected() {
  if (!selectedIds.size) { alert('请先选择要导出的对话'); return; }
  const selected = allConvs.filter(c => selectedIds.has(c.id));
  const text = selected.map(fmtConv).join('\n\n' + '═'.repeat(50) + '\n\n');
  download(text, `已选${selected.length}个对话.txt`);
}

async function clearAll(){
  if(!confirm('确定清空所有记录？不可恢复。'))return;
  await dbClear('conversations');await dbClear('bookmarks');
  allConvs=[];bookmarks=new Set();currentId=null;
  document.getElementById('emptyState').style.display='flex';
  document.getElementById('mainHeader').style.display='none';
  document.getElementById('messages').style.display='none';
  updateStats();renderSidebar();
}

(function(){
  const div=document.getElementById('divider'),sb=document.getElementById('sidebar');
  let dragging=false,startX=0,startW=0;
  div.addEventListener('mousedown',e=>{dragging=true;startX=e.clientX;startW=sb.offsetWidth;div.classList.add('dragging');document.body.style.cssText+='cursor:col-resize;user-select:none';e.preventDefault()});
  div.addEventListener('touchstart',e=>{dragging=true;startX=e.touches[0].clientX;startW=sb.offsetWidth;e.preventDefault()},{passive:false});
  document.addEventListener('mousemove',e=>{if(!dragging)return;sb.style.width=Math.min(500,Math.max(140,startW+e.clientX-startX))+'px'});
  document.addEventListener('touchmove',e=>{if(!dragging)return;sb.style.width=Math.min(500,Math.max(140,startW+e.touches[0].clientX-startX))+'px'},{passive:true});
  const stop=()=>{dragging=false;div.classList.remove('dragging');document.body.style.cursor='';document.body.style.userSelect=''};
  document.addEventListener('mouseup',stop);document.addEventListener('touchend',stop);
})();

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function highlight(html,q){if(!q)return html;return html.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<mark>$1</mark>');}

openDB().then(()=>loadAll()).catch(console.error);
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
