<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记忆馆">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗂️</text></svg>">
<link rel="manifest" href="manifest.json">
<title>我的 ChatGPT 记忆馆</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0E0C;
  --surface: #1A1815;
  --surface2: #221F1B;
  --border: #2E2A24;
  --gold: #C9A84C;
  --gold-dim: #7A6530;
  --text: #E8E0D0;
  --text-dim: #7A7060;
  --text-muted: #4A4540;
  --user: #C9A84C;
  --assistant: #8BA89A;
  --accent: #A0785A;
  --bookmark: #C97070;
  --search-hl: rgba(201,168,76,0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif SC', serif;
  font-size: 14px;
  overflow: hidden;
}

/* ── 布局 ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.app-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── 顶栏 ── */
.topbar {
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
}

.topbar-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-style: italic;
  color: var(--gold);
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.search-wrap {
  flex: 1;
  position: relative;
  max-width: 400px;
}

.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 36px 6px 14px;
  color: var(--text);
  font-family: inherit;
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}

.search-input:focus { border-color: var(--gold-dim); }
.search-input::placeholder { color: var(--text-muted); }

.search-icon {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 0.8rem;
  pointer-events: none;
}

.search-count {
  font-size: 0.75rem;
  color: var(--text-dim);
  white-space: nowrap;
}

.topbar-actions {
  display: flex;
  gap: 8px;
  margin-left: auto;
}

.btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 12px;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn:hover { border-color: var(--gold-dim); color: var(--gold); }
.btn.primary { border-color: var(--gold-dim); color: var(--gold); }
.btn.primary:hover { background: rgba(201,168,76,0.1); }

/* ── 分隔线 ── */
.divider {
  width: 4px;
  background: var(--border);
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.15s;
  position: relative;
}

.divider:hover, .divider.dragging { background: var(--gold-dim); }

.divider::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 2px;
  height: 40px;
  background: currentColor;
  border-radius: 1px;
  opacity: 0.4;
}

/* ── 左侧栏 ── */
.sidebar {
  width: 280px;
  min-width: 160px;
  max-width: 600px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}

.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab:hover:not(.active) { color: var(--text-dim); }

.sidebar-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.sidebar-content::-webkit-scrollbar { width: 3px; }
.sidebar-content::-webkit-scrollbar-track { background: transparent; }
.sidebar-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.conv-item {
  padding: 10px 14px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.15s;
  position: relative;
}

.conv-item:hover { background: var(--surface2); }
.conv-item.active { background: var(--surface2); border-left-color: var(--gold); }

.conv-title {
  font-size: 0.82rem;
  color: var(--text);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.conv-meta {
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-top: 4px;
}

.conv-bookmark-dot {
  position: absolute;
  right: 10px;
  top: 12px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--bookmark);
}

/* ── 主内容区 ── */
.main {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.main-header {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.main-conv-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem;
  color: var(--text-dim);
  font-style: italic;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.message {
  display: flex;
  flex-direction: column;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  position: relative;
}

.message:last-child { border-bottom: none; }

.message-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.role-badge {
  font-size: 0.68rem;
  letter-spacing: 0.15em;
  padding: 2px 8px;
  border-radius: 3px;
  font-weight: 600;
}

.role-user { color: var(--user); background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); }
.role-assistant { color: var(--assistant); background: rgba(139,168,154,0.08); border: 1px solid rgba(139,168,154,0.2); }
.role-system { color: var(--text-muted); background: rgba(255,255,255,0.03); border: 1px solid var(--border); }

.message-time {
  font-size: 0.68rem;
  color: var(--text-muted);
}

.bookmark-btn {
  margin-left: auto;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 0.9rem;
  padding: 2px 6px;
  border-radius: 4px;
  transition: all 0.15s;
  line-height: 1;
}

.bookmark-btn:hover { color: var(--bookmark); }
.bookmark-btn.active { color: var(--bookmark); }

.message-body {
  color: var(--text);
  line-height: 1.8;
  font-size: 0.88rem;
  white-space: pre-wrap;
  word-break: break-word;
}

.message-body mark {
  background: var(--search-hl);
  color: var(--gold);
  border-radius: 2px;
  padding: 0 1px;
}

/* ── 空状态 ── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: var(--text-muted);
}

.empty-icon { font-size: 3rem; opacity: 0.4; }

.empty-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem;
  font-style: italic;
  color: var(--text-dim);
}

.empty-sub {
  font-size: 0.8rem;
  text-align: center;
  line-height: 1.8;
  max-width: 280px;
}

/* ── 上传区 ── */
.upload-zone {
  border: 1px dashed var(--border);
  border-radius: 8px;
  padding: 16px 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  margin: 12px;
}

.upload-zone:hover { border-color: var(--gold-dim); background: rgba(201,168,76,0.03); }
.upload-zone.drag { border-color: var(--gold); background: rgba(201,168,76,0.06); }

.upload-zone input { display: none; }

.upload-text { font-size: 0.78rem; color: var(--text-muted); }
.upload-text span { color: var(--gold-dim); }

/* ── 统计栏 ── */
.stats-bar {
  padding: 8px 14px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  font-size: 0.7rem;
  color: var(--text-muted);
  display: flex;
  gap: 16px;
  flex-shrink: 0;
}

/* ── 搜索模式 ── */
.search-results-list .conv-item { flex-direction: column; }
.search-snippet {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.5;
}

/* ── 导出弹窗 ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 24px;
  width: 320px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  color: var(--gold);
  font-style: italic;
}

.modal-body { font-size: 0.82rem; color: var(--text-dim); line-height: 1.7; }

.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* ── 随机条 ── */
.random-bar {
  display: none;
  padding: 12px 20px;
  background: rgba(201,168,76,0.06);
  border-bottom: 1px solid rgba(201,168,76,0.15);
  font-size: 0.82rem;
  color: var(--text-dim);
  font-style: italic;
  line-height: 1.7;
  flex-shrink: 0;
  position: relative;
}

.random-bar.show { display: block; }
.random-bar-close {
  position: absolute;
  right: 12px;
  top: 10px;
  cursor: pointer;
  color: var(--text-muted);
  background: none;
  border: none;
  font-size: 0.9rem;
}
</style>
</head>
<body>

<div class="app">
  <!-- 顶栏 -->
  <div class="topbar">
    <div class="topbar-title">🗂 记忆馆</div>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="搜索对话内容..." autocomplete="off">
      <span class="search-icon">⌕</span>
    </div>
    <span class="search-count" id="searchCount"></span>
    <div class="topbar-actions">
      <button class="btn" onclick="randomMessage()">随机</button>
      <button class="btn primary" onclick="showExportModal()">导出</button>
      <button class="btn" onclick="clearAll()" style="color:var(--text-muted)">清空</button>
    </div>
  </div>

  <!-- 主体 -->
  <div class="app-body">
  <!-- 左侧栏 -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-tabs">
      <div class="tab active" id="tabAll" onclick="switchTab('all')">全部</div>
      <div class="tab" id="tabBookmark" onclick="switchTab('bookmarks')">收藏</div>
      <div class="tab" id="tabSearch" onclick="switchTab('search')">搜索</div>
    </div>

    <!-- 上传区 -->
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".json" multiple onchange="handleFiles(this.files)">
      <div class="upload-text">点击或拖入 <span>conversations.json</span><br>支持多文件合并</div>
    </div>

    <div class="sidebar-content" id="sidebarContent"></div>

    <div class="stats-bar" id="statsBar">
      <span id="statConvs">0 个对话</span>
      <span id="statMsgs">0 条消息</span>
      <span id="statBookmarks">0 收藏</span>
    </div>
  </div>

  <!-- 分隔线 -->
  <div class="divider" id="divider"></div>

  <!-- 主内容 -->
  <div class="main">
    <div class="random-bar" id="randomBar">
      <button class="random-bar-close" onclick="document.getElementById('randomBar').classList.remove('show')">×</button>
      <span id="randomText"></span>
    </div>

    <div class="main-header" id="mainHeader" style="display:none">
      <div class="main-conv-title" id="mainTitle"></div>
      <button class="btn" onclick="exportCurrentConv()">导出此对话</button>
    </div>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🗂️</div>
      <div class="empty-title">你们说过的每一句话</div>
      <div class="empty-sub">导入 ChatGPT 的 conversations.json<br>数据会自动保存在本地，下次打开无需重新导入</div>
    </div>

    <div class="messages" id="messages" style="display:none"></div>
  </div>
</div>
  </div><!-- end app-body -->

<!-- 导出弹窗 -->
<div class="modal-overlay" id="exportModal" onclick="if(event.target===this)this.classList.remove('show')">
  <div class="modal">
    <div class="modal-title">导出</div>
    <div class="modal-body" id="exportModalBody">选择导出内容</div>
    <div class="modal-actions">
      <button class="btn" onclick="document.getElementById('exportModal').classList.remove('show')">取消</button>
      <button class="btn primary" id="exportConfirmBtn">确认导出</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// IndexedDB
// ══════════════════════════════════════
const DB_NAME = 'gpt-viewer-v1';
const DB_VERSION = 1;
let db;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('conversations')) {
        db.createObjectStore('conversations', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('bookmarks')) {
        db.createObjectStore('bookmarks', { keyPath: 'id' });
      }
      if (!db.objectStoreNames.contains('meta')) {
        db.createObjectStore('meta', { keyPath: 'key' });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function dbGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(store, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbClear(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ══════════════════════════════════════
// 应用状态
// ══════════════════════════════════════
let allConversations = []; // [{id, title, create_time, messages:[{role,content,time,id}]}]
let bookmarks = new Set();
let currentConvId = null;
let currentTab = 'all';
let searchQuery = '';
let exportTarget = null; // 'all' | 'bookmarks' | 'current'

// ══════════════════════════════════════
// 解析 GPT JSON
// ══════════════════════════════════════
function parseGPTJson(raw) {
  let data = raw;
  if (!Array.isArray(raw)) {
    if (raw && Array.isArray(raw.conversations)) data = raw.conversations;
    else if (raw && typeof raw === 'object') data = [raw];
    else return [];
  }

  const convs = [];
  for (const conv of data) {
    if (!conv || typeof conv !== 'object') continue;

    const id = conv.id || conv.conversation_id || String(conv.create_time || Math.random());
    const title = conv.title || '无标题';
    const createTime = conv.create_time || 0;
    const msgs = [];

    if (conv.mapping && typeof conv.mapping === 'object') {
      for (const nodeId in conv.mapping) {
        const node = conv.mapping[nodeId];
        if (!node || !node.message) continue;
        const msg = node.message;
        const role = msg.author?.role || msg.role;
        if (!role || role === 'system' || role === 'tool') continue;

        let content = '';
        if (msg.content?.parts) {
          content = msg.content.parts.filter(p => typeof p === 'string').join('');
        } else if (typeof msg.content === 'string') {
          content = msg.content;
        } else if (msg.content?.text) {
          content = msg.content.text;
        }

        if (!content.trim()) continue;
        msgs.push({
          id: nodeId,
          role: role === 'user' ? 'user' : 'assistant',
          content: content.trim(),
          time: msg.create_time || 0
        });
      }
      msgs.sort((a, b) => a.time - b.time);
    } else if (Array.isArray(conv.messages)) {
      for (let i = 0; i < conv.messages.length; i++) {
        const msg = conv.messages[i];
        if (!msg) continue;
        const role = msg.role || msg.author?.role;
        if (!role || role === 'system') continue;

        let content = '';
        if (typeof msg.content === 'string') content = msg.content;
        else if (Array.isArray(msg.content)) content = msg.content.filter(p => typeof p === 'string').join('');
        else if (msg.content?.text) content = msg.content.text;
        else if (msg.content?.parts) content = msg.content.parts.filter(p => typeof p === 'string').join('');

        if (!content.trim()) continue;
        msgs.push({
          id: msg.id || `${id}-${i}`,
          role: role === 'user' ? 'user' : 'assistant',
          content: content.trim(),
          time: msg.create_time || msg.timestamp || 0
        });
      }
    }

    if (msgs.length === 0) continue;
    convs.push({ id, title, create_time: createTime, messages: msgs });
  }
  return convs;
}

// ══════════════════════════════════════
// 文件导入
// ══════════════════════════════════════
function setUploadStatus(text, isError) {
  const el = document.querySelector('.upload-text');
  if (el) { el.innerHTML = text; el.style.color = isError ? '#C97070' : ''; }
}

async function handleFiles(files) {
  if (!files || files.length === 0) return;
  setUploadStatus('⏳ 正在导入...');
  let totalImported = 0, errors = 0;

  for (const file of files) {
    try {
      setUploadStatus(`⏳ 读取 ${file.name}...`);
      const text = await file.text();
      let raw;
      try { raw = JSON.parse(text); } catch(e) { errors++; continue; }

      const convs = parseGPTJson(raw);
      if (convs.length === 0) { errors++; continue; }

      for (const conv of convs) {
        await dbPut('conversations', conv);
        totalImported++;
      }
    } catch (e) {
      errors++;
      console.error('导入失败', file.name, e);
    }
  }

  await loadAll();

  if (totalImported > 0) {
    setUploadStatus(`✓ 已导入 <span>${totalImported} 个对话</span>，继续拖入更多`);
  } else {
    setUploadStatus('⚠ 未能识别格式，确认是 ChatGPT 导出的 conversations.json', true);
  }
}

// 拖拽
const uploadZone = document.getElementById('uploadZone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  handleFiles(e.dataTransfer.files);
});

// ══════════════════════════════════════
// 加载数据
// ══════════════════════════════════════
async function loadAll() {
  const convs = await dbGetAll('conversations');
  allConversations = convs.sort((a, b) => a.create_time - b.create_time);

  const bms = await dbGetAll('bookmarks');
  bookmarks = new Set(bms.map(b => b.id));

  updateStats();
  renderSidebar();
}

// ══════════════════════════════════════
// 统计
// ══════════════════════════════════════
function updateStats() {
  const total = allConversations.length;
  const msgs = allConversations.reduce((n, c) => n + c.messages.length, 0);
  document.getElementById('statConvs').textContent = `${total} 个对话`;
  document.getElementById('statMsgs').textContent = `${msgs} 条消息`;
  document.getElementById('statBookmarks').textContent = `${bookmarks.size} 收藏`;
}

// ══════════════════════════════════════
// 侧栏渲染
// ══════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  ['all','bookmarks','search'].forEach(t => {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1))?.classList.toggle('active', t === tab);
  });
  renderSidebar();
}

function renderSidebar() {
  const container = document.getElementById('sidebarContent');

  let list = allConversations;

  if (currentTab === 'bookmarks') {
    list = allConversations.filter(c => bookmarks.has(c.id));
  }

  if (currentTab === 'search' || (currentTab === 'all' && searchQuery)) {
    const q = searchQuery.toLowerCase();
    if (q) {
      list = allConversations.filter(c =>
        c.title.toLowerCase().includes(q) ||
        c.messages.some(m => m.content.toLowerCase().includes(q))
      );
    }
  }

  if (list.length === 0) {
    container.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:0.78rem;">暂无内容</div>`;
    return;
  }

  container.innerHTML = list.map(conv => {
    const active = conv.id === currentConvId ? 'active' : '';
    const hasBm = bookmarks.has(conv.id);
    const date = conv.create_time ? new Date(conv.create_time * 1000).toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'}) : '';
    const msgCount = conv.messages.length;

    let snippet = '';
    if (searchQuery && currentTab === 'search') {
      const q = searchQuery.toLowerCase();
      const hit = conv.messages.find(m => m.content.toLowerCase().includes(q));
      if (hit) {
        const idx = hit.content.toLowerCase().indexOf(q);
        const start = Math.max(0, idx - 20);
        snippet = '…' + hit.content.slice(start, start + 80) + '…';
      }
    }

    return `
      <div class="conv-item ${active}" onclick="selectConv('${conv.id}')">
        ${hasBm ? '<div class="conv-bookmark-dot"></div>' : ''}
        <div class="conv-title">${escHtml(conv.title)}</div>
        <div class="conv-meta">${date} · ${msgCount} 条</div>
        ${snippet ? `<div class="search-snippet">${highlightText(escHtml(snippet), searchQuery)}</div>` : ''}
      </div>`;
  }).join('');

  document.getElementById('searchCount').textContent =
    searchQuery ? `${list.length} 个结果` : '';
}

// ══════════════════════════════════════
// 选中对话
// ══════════════════════════════════════
function selectConv(id) {
  currentConvId = id;
  const conv = allConversations.find(c => c.id === id);
  if (!conv) return;

  renderSidebar();

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('mainHeader').style.display = 'flex';
  document.getElementById('messages').style.display = 'flex';
  document.getElementById('mainTitle').textContent = conv.title;

  const container = document.getElementById('messages');
  container.innerHTML = conv.messages.map(msg => {
    const roleLabel = msg.role === 'user' ? 'YOU' : 'GPT';
    const roleClass = msg.role === 'user' ? 'role-user' : 'role-assistant';
    const time = msg.time ? new Date(msg.time * 1000).toLocaleString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    const bmActive = bookmarks.has(msg.id) ? 'active' : '';
    const content = searchQuery ? highlightText(escHtml(msg.content), searchQuery) : escHtml(msg.content);

    return `
      <div class="message" id="msg-${msg.id}">
        <div class="message-header">
          <span class="role-badge ${roleClass}">${roleLabel}</span>
          <span class="message-time">${time}</span>
          <button class="bookmark-btn ${bmActive}" onclick="toggleBookmark('${msg.id}', event)" title="收藏">♡</button>
        </div>
        <div class="message-body">${content}</div>
      </div>`;
  }).join('');
}

// ══════════════════════════════════════
// 书签
// ══════════════════════════════════════
async function toggleBookmark(id, e) {
  e.stopPropagation();
  const btn = e.currentTarget;

  // 先判断是消息ID还是对话ID
  if (bookmarks.has(id)) {
    bookmarks.delete(id);
    await dbDelete('bookmarks', id);
    btn.classList.remove('active');
  } else {
    bookmarks.add(id);
    await dbPut('bookmarks', { id });
    btn.classList.add('active');
  }

  updateStats();
  if (currentTab === 'bookmarks') renderSidebar();
}

// ══════════════════════════════════════
// 搜索
// ══════════════════════════════════════
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  if (searchQuery) switchTab('search');
  else switchTab('all');

  // 如果当前对话打开，重新渲染高亮
  if (currentConvId) selectConv(currentConvId);
});

// ══════════════════════════════════════
// 随机消息
// ══════════════════════════════════════
function randomMessage() {
  const allMsgs = allConversations.flatMap(c =>
    c.messages.filter(m => m.role === 'assistant')
  );
  if (!allMsgs.length) return;
  const msg = allMsgs[Math.floor(Math.random() * allMsgs.length)];
  const bar = document.getElementById('randomBar');
  document.getElementById('randomText').textContent = msg.content.slice(0, 200) + (msg.content.length > 200 ? '…' : '');
  bar.classList.add('show');
}

// ══════════════════════════════════════
// 导出
// ══════════════════════════════════════
function showExportModal() {
  const modal = document.getElementById('exportModal');
  const body = document.getElementById('exportModalBody');
  const btn = document.getElementById('exportConfirmBtn');

  const opts = [];
  if (currentConvId) opts.push('当前对话');
  opts.push('全部对话', '书签收藏');

  body.innerHTML = opts.map((o, i) =>
    `<label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer">
      <input type="radio" name="exportOpt" value="${i}" ${i===0?'checked':''} style="accent-color:var(--gold)">
      ${o}
    </label>`
  ).join('');

  btn.onclick = () => {
    const val = parseInt(document.querySelector('input[name=exportOpt]:checked')?.value || '0');
    const label = opts[val];
    if (label === '当前对话') exportConv(currentConvId);
    else if (label === '全部对话') exportAll();
    else exportBookmarked();
    modal.classList.remove('show');
  };

  modal.classList.add('show');
}

function exportCurrentConv() {
  if (currentConvId) exportConv(currentConvId);
}

function exportConv(id) {
  const conv = allConversations.find(c => c.id === id);
  if (!conv) return;
  const text = formatConvText(conv);
  downloadText(text, conv.title.slice(0, 30) + '.txt');
}

function exportAll() {
  const text = allConversations.map(formatConvText).join('\n\n' + '═'.repeat(60) + '\n\n');
  downloadText(text, '全部对话.txt');
}

function exportBookmarked() {
  // 导出含书签消息的对话
  const text = allConversations
    .filter(c => c.messages.some(m => bookmarks.has(m.id)))
    .map(c => {
      const bmMsgs = c.messages.filter(m => bookmarks.has(m.id));
      return `【${c.title}】\n\n` + bmMsgs.map(m =>
        `[${m.role === 'user' ? 'YOU' : 'GPT'}]\n${m.content}`
      ).join('\n\n─\n\n');
    }).join('\n\n' + '═'.repeat(60) + '\n\n');
  downloadText(text || '暂无收藏', '书签收藏.txt');
}

function formatConvText(conv) {
  const date = conv.create_time ? new Date(conv.create_time * 1000).toLocaleDateString('zh-CN') : '';
  return `【${conv.title}】  ${date}\n${'─'.repeat(40)}\n\n` +
    conv.messages.map(m =>
      `[${m.role === 'user' ? 'YOU' : 'GPT'}]\n${m.content}`
    ).join('\n\n─\n\n');
}

function downloadText(text, filename) {
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ══════════════════════════════════════
// 清空
// ══════════════════════════════════════
async function clearAll() {
  if (!confirm('确定要清空所有对话数据吗？此操作不可恢复。')) return;
  await dbClear('conversations');
  await dbClear('bookmarks');
  allConversations = [];
  bookmarks = new Set();
  currentConvId = null;
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('mainHeader').style.display = 'none';
  document.getElementById('messages').style.display = 'none';
  updateStats();
  renderSidebar();
}

// ══════════════════════════════════════
// 工具函数
// ══════════════════════════════════════
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlightText(html, query) {
  if (!query) return html;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return html.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

// ══════════════════════════════════════
// 可拖拽分隔线
// ══════════════════════════════════════
(function() {
  const divider = document.getElementById('divider');
  const sidebar = document.getElementById('sidebar');
  if (!divider || !sidebar) return;

  let dragging = false;
  let startX = 0;
  let startW = 0;

  divider.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  // 触摸支持
  divider.addEventListener('touchstart', e => {
    dragging = true;
    startX = e.touches[0].clientX;
    startW = sidebar.offsetWidth;
    divider.classList.add('dragging');
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = e.clientX - startX;
    const newW = Math.min(600, Math.max(160, startW + delta));
    sidebar.style.width = newW + 'px';
  });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const delta = e.touches[0].clientX - startX;
    const newW = Math.min(600, Math.max(160, startW + delta));
    sidebar.style.width = newW + 'px';
  }, { passive: true });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  document.addEventListener('touchend', () => {
    dragging = false;
    divider.classList.remove('dragging');
  });
})();

// ══════════════════════════════════════

// ══════════════════════════════════════
openDB().then(() => loadAll()).catch(console.error);

// PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
